<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="h-screen">
    
    <div class="flex h-full">
        
        <div class="w-1/2 bg-gradient-to-b from-orange-400 to-orange-800 flex items-center justify-center text-white pt-14 relative">
            <img src="../images/bg-01.png" class="absolute bottom-0 right-0">
            <div class="border border-white w-[70%] bg-white/25 h-full p-10 z-10 flex flex-col relative  justify-between rounded-lg">
                <h1 class="text-7xl font-light leading-tight ">
                Empowering<br>
                People<br>
                through<br>
                seamless Hr<br>
                management
                </h1> 
            <div>
            <img src="../images/authentication-bg-01.png" class="w-72 absolute bottom-0 right-20">
             </div>
            <div>
            <img src="../images/bg-02.png" class="absolute left-3 bottom-0 max-h-16">
        </div>
            </div>

        </div>

    <div class="relative w-1/2 bg-orange-100 flex flex-col justify-center items-center">
            <div class="absolute top-0 m-5">
                <img src="../images/logo.svg">
            </div>

            <div class="absolute top-20 text-center">
                <h1 class="text-2xl text-black font-bold">Sign Up</h1>
                <p class="text-gray-600">please enter your details to sign up</p>
            </div>
        <form class="p-2 space-y-6 mt-28">
           <div>
            <h1>Name</h1>
            <input type="text" required class="w-[400px] focus:outline-none p-2">
           </div>
      

        <div>
             <h1>Email Address</h1>
            <input type="email" required class="w-[400px] focus:outline-none p-2">
        </div>

        <div>
            <h1>Password</h1>
            <input type="password" required class="w-[400px] focus:outline-none p-2">
        </div>

        <div>
            <h1>Confirm Password</h1>
            <input type="password" required class="w-[400px] focus:outline-none p-2">
        </div>
        
        <div>
            <label class="flex items-center px-1 text-gray-600">
                <input type="checkbox">
                Agree to  <span class="text-orange-400">Terms&Privacy</span>
            </label>
        </div>

        <div class="text-center text-white">
            <button class="bg-orange-500 w-full py-2 rounded-lg">Sign Up</button>
        </div>
            <h1 class="flex items-center justify-center cursor-pointer">Already have an account?<a href="Signin.html" class="text-orange-500">Sign In</a></h1>
        
        <div class="flex justify-center gap-3">
            <div class="text-center">
              <div class="bg-blue-600 px-10 py-2 rounded-lg"><img src="../images/facebook-logo.svg"></div>
            </div>

            <div class="text-center">
              <div class="bg-white px-10 py-2 rounded-lg"><img src="../images/google-logo.svg"></div>
            </div>

            <div class="text-center">
              <div class="bg-black px-10 py-2 rounded-lg"><img src="../images/apple-logo.svg"></div>
            </div>
      
        </div>

         <p class=" flex items-center justify-center">Copyright©2024-SmartHr</p>
        

    </form>
    </div>
</div>
   

</body>
</html>
