<head>

    <title>SmartHr Admin Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

  <div id="page404" class=" flex items-center justify-between min-h-screen  left-10 py-24 mt-24 px-20">

      ← Back to Dashboard

 </body>
